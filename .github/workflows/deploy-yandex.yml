name: Deploy backend to Yandex Cloud

on:
  push:
    branches: [main]
    paths:
      - "packages/server/**"
      - "packages/shared/**"
      - "Dockerfile"
      - ".github/workflows/deploy-yandex.yml"
  workflow_dispatch:

env:
  CR_REPOSITORY: figma-design-diff-backend
  CONTAINER_NAME: figma-design-diff-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Cloud Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push image
        run: |
          IMAGE="cr.yandex/${{ vars.YC_REGISTRY_ID }}/${{ env.CR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Serverless Containers
        uses: yc-actions/yc-sls-container-deploy@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          container-name: ${{ env.CONTAINER_NAME }}
          folder-id: ${{ vars.YC_FOLDER_ID }}
          revision-image-url: cr.yandex/${{ vars.YC_REGISTRY_ID }}/${{ env.CR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          revision-service-account-id: ${{ vars.YC_SA_ID }}
          revision-cores: 2
          revision-memory: 2Gb
          revision-core-fraction: 100
          revision-concurrency: 1
          revision-execution-timeout: 60
          public: true
