name: Deploy backend to VPS

on:
  push:
    branches: [main]
    paths:
      - "packages/server/**"
      - "packages/shared/**"
      - "Dockerfile"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/app
            git pull
            sudo docker build -t figma-design-diff-backend:latest .
            sudo docker stop backend
            sudo docker rm backend
            sudo docker run -d --name backend --restart unless-stopped \
              -p 127.0.0.1:4517:4517 -e NODE_ENV=production \
              figma-design-diff-backend:latest
            sudo docker image prune -f
